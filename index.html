<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>ヨルシカ全曲ランキング</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Yuji+Syuku&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#2f6ea0; --ink-dark:#214f74; --paper:#f7f2e7; --paper-2:#f1eadc; --paper-3:#ece2cf;
  --shadow-deep:rgba(53,39,19,.24);
  --s:#3b6d95; --a:#5486aa; --b:#6a9ab9; --c:#8ab1ca; --d:#abc9da;
}
* { box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
html,body {
  margin:0; padding:0; min-height:100%;
  background:
    radial-gradient(circle at 18% 14%, rgba(255,255,255,.55), transparent 24%),
    radial-gradient(circle at 82% 20%, rgba(255,255,255,.25), transparent 20%),
    linear-gradient(180deg, #dbcfb8 0%, #d2c4aa 100%);
  color:var(--ink-dark);
  font-family:"Klee One","Hiragino Mincho ProN","Yu Mincho",serif;
}
body { padding:22px; overscroll-behavior-y: contain; }
body.drag-lock { overflow:hidden; }
.app { max-width:1260px; margin:0 auto; perspective:2000px; }
.page {
  min-height:86vh; position:relative; overflow:hidden; transform-origin:left center;
  background:
    radial-gradient(circle at 20% 12%, rgba(255,255,255,.5), transparent 24%),
    radial-gradient(circle at 78% 18%, rgba(255,255,255,.22), transparent 18%),
    linear-gradient(180deg, rgba(255,255,255,.08), rgba(0,0,0,.02)),
    repeating-linear-gradient(180deg, rgba(80,110,135,.055) 0px, rgba(80,110,135,.055) 1px, transparent 1px, transparent 39px),
    linear-gradient(180deg, var(--paper) 0%, var(--paper-2) 60%, var(--paper-3) 100%);
  border-radius:18px 22px 20px 18px;
  box-shadow:0 18px 42px var(--shadow-deep), inset 0 1px 0 rgba(255,255,255,.5), inset 28px 0 38px rgba(132,113,79,.11), inset -10px 0 22px rgba(109,89,57,.06), inset 0 -20px 35px rgba(111,93,62,.05);
}
.page::before {
  content:""; position:absolute; inset:0; pointer-events:none;
  background:
    radial-gradient(circle at 17% 22%, rgba(150,118,77,.08), transparent 18%),
    radial-gradient(circle at 72% 68%, rgba(95,80,48,.05), transparent 20%),
    radial-gradient(circle at 60% 16%, rgba(255,255,255,.18), transparent 14%),
    repeating-radial-gradient(circle at 0 0, rgba(74,58,29,.018) 0 1px, transparent 1px 7px);
  mix-blend-mode:multiply;
}
.page::after {
  content:""; position:absolute; left:0; top:0; bottom:0; width:58px; pointer-events:none;
  background:linear-gradient(90deg, rgba(100,78,48,.14), rgba(100,78,48,.07) 20%, rgba(255,255,255,.06) 48%, transparent 100%);
  box-shadow: inset -1px 0 0 rgba(107,85,53,.10);
}
.page.flip-in { animation: flipIn .9s cubic-bezier(.2,.8,.1,1) both; }
.page.flip-in-home { animation: flipInHome 1.15s cubic-bezier(.15,.82,.08,1) both; }
.page.flip-back { animation: flipBack .72s cubic-bezier(.35,.1,.2,1) both; }
@keyframes flipIn {
  0% { transform: rotateY(-18deg) translateX(26px) scale(.985); opacity:.25; filter:blur(1px); }
  100% { transform: rotateY(0deg) translateX(0) scale(1); opacity:1; filter:none; }
}
@keyframes flipInHome {
  0% { transform: rotateY(-56deg) translateX(120px) scale(.93); opacity:.05; filter:blur(2px); }
  55% { transform: rotateY(12deg) translateX(-8px) scale(1.01); opacity:1; filter:none; }
  100% { transform: rotateY(0deg) translateX(0) scale(1); opacity:1; }
}
@keyframes flipBack {
  0% { transform: rotateY(0deg) translateX(0) scale(1); opacity:1; }
  100% { transform: rotateY(16deg) translateX(24px) scale(.988); opacity:.18; }
}

.content { position:relative; z-index:2; padding:40px 48px 42px 80px; }
.header { text-align:center; margin:8px 0 28px; }
.title { font-family:"Klee One","Yu Mincho",serif; color:var(--ink); font-size:clamp(28px,4vw,44px); letter-spacing:.08em; font-weight:600; margin:0 0 8px; }
.menu { display:flex; flex-direction:column; align-items:center; gap:22px; margin:28px auto 16px; max-width:520px; }
.menu-button {
  width:100%; appearance:none; background:none; border:none; color:var(--ink);
  font:600 clamp(18px,2.1vw,24px)/1.5 "Klee One","Yu Mincho",serif; padding:8px 12px 20px;
  position:relative; cursor:pointer; text-align:center;
}
.menu-button .label { position:relative; display:inline-block; }
.menu-button .line {
  position:absolute; left:50%; bottom:0; width:min(280px, calc(100% + 36px)); height:16px;
  transform:translateX(-50%) scaleX(0); transform-origin:center; transition:transform .34s ease; pointer-events:none;
}
.menu-button:hover .line, .menu-button:focus-visible .line { transform:translateX(-50%) scaleX(1); }
.menu-button .line path { fill:none; stroke:rgba(47,110,160,.68); stroke-width:2.5; stroke-linecap:round; }

.top-actions,.bottom-actions { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
.small-btn,.ghost-btn,.rank-btn,.mini,.handle-btn {
  appearance:none; border:none; cursor:pointer; border-radius:14px; font-family:"Klee One","Yu Mincho",serif;
}
.small-btn,.ghost-btn,.mini,.handle-btn { padding:11px 18px; font-size:14px; font-weight:600; touch-action: manipulation; }
.small-btn { background:rgba(47,110,160,.12); color:var(--ink-dark); box-shadow:0 2px 8px rgba(47,110,160,.08), inset 0 1px 0 rgba(255,255,255,.45); }
.ghost-btn { background:rgba(255,255,255,.34); color:var(--ink-dark); border:1px solid rgba(47,110,160,.18); }
.small-btn:disabled { opacity:.42; cursor:default; }
.info { font-size:14px; color:rgba(33,79,116,.84); }
.section-title { font-size:18px; color:var(--ink); margin:0 0 12px; letter-spacing:.06em; }
.note-box { background:rgba(255,255,255,.24); border:1px solid rgba(84,112,137,.16); border-radius:18px; padding:18px 20px; box-shadow: inset 0 1px 0 rgba(255,255,255,.35); }

.song-title-wrap { text-align:center; padding:58px 20px 42px; margin:18px 0 16px; }
.song-title { font-family:"Yuji Syuku","Klee One","Yu Mincho",serif; color:var(--ink); font-size:clamp(24px,3.4vw,36px); line-height:1.45; letter-spacing:.04em; }
.progress-line { width:100%; height:12px; border-radius:999px; background:rgba(47,110,160,.08); overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg, rgba(47,110,160,.7), rgba(47,110,160,.35)); }
.rank-row { display:grid; grid-template-columns:repeat(5, minmax(0,1fr)); gap:10px; margin-top:14px; }
.rank-btn { color:#fff; font-size:18px; padding:15px 0; box-shadow:0 8px 20px rgba(39,71,98,.16), inset 0 1px 0 rgba(255,255,255,.24); touch-action: manipulation; }
.rank-btn.s { background:var(--s); } .rank-btn.a { background:var(--a); } .rank-btn.b { background:var(--b); } .rank-btn.c { background:var(--c); color:#18374f; } .rank-btn.d { background:var(--d); color:#153145; }

.layout-two { display:grid; grid-template-columns:minmax(0,1fr) 340px; gap:26px; }
.group-side { background:rgba(255,255,255,.22); border:1px solid rgba(84,112,137,.16); border-radius:18px; padding:18px 18px 18px 20px; max-height:70vh; overflow:auto; }
.group-side ul { margin:10px 0 0 0; padding-left:0; list-style:none; }
.group-side li { margin:6px 0; font-size:14px; padding:6px 8px; border-radius:10px; }
.group-side li.current { background:rgba(47,110,160,.12); text-decoration:underline; text-underline-offset:4px; font-weight:600; }

.card-list { display:flex; flex-direction:column; gap:6px; }
.card-item {
  display:grid; grid-template-columns:minmax(0,1fr) auto; align-items:center; gap:10px;
  padding:8px 11px; border-radius:14px; background:rgba(255,255,255,.24); border:1px solid rgba(84,112,137,.14);
  transition:transform .14s ease, box-shadow .14s ease, outline-offset .14s ease, background-color .14s ease;
}
.card-item.compact { padding:5px 9px; }
.card-item.dragging { opacity:.5; transform:rotate(-1deg) scale(1.012); box-shadow:0 18px 32px rgba(39,71,98,.20); }
.card-item.drag-over-top { box-shadow:inset 0 5px 0 rgba(47,110,160,.8),0 12px 22px rgba(39,71,98,.12); background:rgba(47,110,160,.1); transform:translateY(2px); }
.card-item.drag-over-bottom { box-shadow:inset 0 -5px 0 rgba(47,110,160,.8),0 12px 22px rgba(39,71,98,.12); background:rgba(47,110,160,.1); transform:translateY(-2px); }

.top10-box { margin:8px 0 14px; background:rgba(255,255,255,.3); border:1px solid rgba(84,112,137,.16); border-radius:18px; padding:12px 14px 10px; }
.top10-grid { display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:6px 14px; margin-top:8px; }
.top10-item { font-size:13px; line-height:1.35; color:var(--ink-dark); }

.item-title { font-size:13px; color:var(--ink-dark); line-height:1.3; }
.item-sub { font-size:10.5px; color:rgba(33,79,116,.72); margin-top:1px; line-height:1.2; }
.item-buttons { display:flex; gap:8px; }
.drag-main { min-width:0; }
.drag-controls { display:flex; align-items:center; gap:6px; }
.handle-btn {
  background:rgba(47,110,160,.14); color:var(--ink-dark);
  padding:10px 12px; font-size:18px; line-height:1; border-radius:12px;
  touch-action:none; user-select:none; -webkit-user-select:none;
}
.mobile-move { display:none; gap:4px; }
.mobile-move .mini { padding:8px 10px; font-size:12px; }
.touch-hint { margin-top:8px; font-size:12px; color:rgba(33,79,116,.7); }

.mini { padding:7px 11px; background:rgba(47,110,160,.12); color:var(--ink-dark); }
.columns { display:grid; grid-template-columns:1fr 1fr; gap:28px; }
.about p,.about li { font-size:15px; line-height:1.9; }
.about ul { margin:8px 0 18px 1.2em; }
.footer-nav { margin-top:24px; }
.page-no { position:absolute; right:26px; bottom:16px; font-size:12px; color:rgba(47,110,160,.55); letter-spacing:.18em; }
.hidden { display:none !important; }
.sticky-bar {
  position:sticky; bottom:8px; z-index:3; margin-top:14px; padding-top:8px;
  background:linear-gradient(180deg, rgba(247,242,231,0), rgba(247,242,231,.78) 28%, rgba(247,242,231,.92));
}
.summary-line { display:flex; gap:16px; flex-wrap:wrap; font-size:14px; color:rgba(33,79,116,.82); margin-top:8px; }
@media (max-width:980px) { .layout-two { grid-template-columns:1fr; } .group-side { max-height:none; } }
@media (max-width:720px) {
  body { padding:8px; }
  .content { padding:28px 18px 32px 48px; }
  .rank-row { grid-template-columns:repeat(2,1fr); }
  .columns,.top10-grid { grid-template-columns:1fr; }
  .drag-controls { flex-direction:column; align-items:stretch; }
  .mobile-move { display:flex; }
  .card-item { grid-template-columns:minmax(0,1fr) 84px; }
}
@media print {
  body { background:#fff; padding:0; }
  .page { box-shadow:none; border-radius:0; }
  .page::before,.page::after,.page-no,.top-actions,.bottom-actions,.sticky-bar,.touch-hint,.handle-btn,.mobile-move { display:none !important; }
}
</style>
</head>
<body>
<div class="app"><div id="app"></div></div>
<script>
(() => {
"use strict";
const SONGS = ["カトレア", "言って。", "あの夏に咲け", "靴の花火", "雲と幽霊", "負け犬にアンコールはいらない", "爆弾魔", "ヒッチコック", "準透明少年", "ただ君に晴れ", "冬眠", "藍二乗", "八月、某、月明かり", "詩書きとコーヒー", "踊ろうぜ", "六月は雨上がりの街を書く", "五月は花緑青の窓辺から", "夜紛い", "パレード", "エルマ", "だから僕は音楽を辞めた", "憂一乗", "夕凪、某、花惑い", "雨とカプチーノ", "神様のダンス", "雨晴るる", "歩く", "心に穴が空いた", "声", "エイミー", "ノーチラス", "昼鳶", "春ひさぎ", "レプリカント", "花人局", "盗作", "思想犯", "逃亡", "夜行", "花に亡霊", "爆弾魔（Re-Recording ver.）", "強盗と花束", "春泥棒", "風を食む", "嘘月", "夏の肖像", "都落ち", "ブレーメン", "チノカテ", "雪国", "月に吠える", "451", "パドドゥ", "又三郎", "老人と海", "さよならモルテン", "いさな", "左右盲", "アルジャーノン", "第一夜", "靴の花火（Re-Recording ver.）", "雲になる", "花も騒めく", "魔性", "プレイシック", "ポスト春", "太陽", "晴る", "忘れてください", "修羅", "火星人", "ルバート", "火葬", "アポリア", "へび", "うめき", "啄木鳥", "月光浴", "千鳥", "櫂", "ヒッチコック（Re-Recording ver.）", "テレパス", "茜", "斜陽"];
const ALBUM_MAP = {"カトレア": "夏草が邪魔をする", "言って。": "夏草が邪魔をする", "あの夏に咲け": "夏草が邪魔をする", "靴の花火": "夏草が邪魔をする", "雲と幽霊": "夏草が邪魔をする", "負け犬にアンコールはいらない": "負け犬にアンコールはいらない", "爆弾魔": "負け犬にアンコールはいらない", "ヒッチコック": "負け犬にアンコールはいらない", "準透明少年": "負け犬にアンコールはいらない", "ただ君に晴れ": "負け犬にアンコールはいらない", "冬眠": "負け犬にアンコールはいらない", "藍二乗": "だから僕は音楽を辞めた", "八月、某、月明かり": "だから僕は音楽を辞めた", "詩書きとコーヒー": "だから僕は音楽を辞めた", "踊ろうぜ": "だから僕は音楽を辞めた", "六月は雨上がりの街を書く": "だから僕は音楽を辞めた", "五月は花緑青の窓辺から": "だから僕は音楽を辞めた", "夜紛い": "だから僕は音楽を辞めた", "パレード": "だから僕は音楽を辞めた", "エルマ": "だから僕は音楽を辞めた", "だから僕は音楽を辞めた": "だから僕は音楽を辞めた", "憂一乗": "エルマ", "夕凪、某、花惑い": "エルマ", "雨とカプチーノ": "エルマ", "神様のダンス": "エルマ", "雨晴るる": "エルマ", "歩く": "エルマ", "心に穴が空いた": "エルマ", "声": "エルマ", "エイミー": "エルマ", "ノーチラス": "エルマ", "昼鳶": "盗作", "春ひさぎ": "盗作", "レプリカント": "盗作", "花人局": "盗作", "盗作": "盗作", "思想犯": "盗作", "逃亡": "盗作", "夜行": "盗作", "花に亡霊": "盗作", "爆弾魔（Re-Recording ver.）": "盗作", "強盗と花束": "創作", "春泥棒": "創作", "風を食む": "創作", "嘘月": "創作", "夏の肖像": "幻燈", "都落ち": "幻燈", "ブレーメン": "幻燈", "チノカテ": "幻燈", "雪国": "幻燈", "月に吠える": "幻燈", "451": "幻燈", "パドドゥ": "幻燈", "又三郎": "幻燈", "老人と海": "幻燈", "さよならモルテン": "幻燈", "いさな": "幻燈", "左右盲": "幻燈", "アルジャーノン": "幻燈", "第一夜": "幻燈", "靴の花火（Re-Recording ver.）": "幻燈", "雲になる": "二人称", "花も騒めく": "二人称", "魔性": "二人称", "プレイシック": "二人称", "ポスト春": "二人称", "太陽": "二人称", "晴る": "二人称", "忘れてください": "二人称", "修羅": "二人称", "火星人": "二人称", "ルバート": "二人称", "火葬": "二人称", "アポリア": "二人称", "へび": "二人称", "うめき": "二人称", "啄木鳥": "二人称", "月光浴": "二人称", "千鳥": "二人称", "櫂": "二人称", "ヒッチコック（Re-Recording ver.）": "二人称", "テレパス": "シングルのみ", "茜": "シングルのみ", "斜陽": "シングルのみ"};
const STORAGE_KEY = "yorushika_ranker_v10_state";
const MAX_UNDO = 5;

function initialState() {
  return {
    view:"home", transition:"none", startedAt:null,
    classifyQueue:[{id:"root", labelPath:[], songs:[...SONGS], done:false}],
    currentClassification:null, rankedGroups:[], rankingQueue:[], currentRanking:null,
    boundaryPairs:[], currentBoundary:null, finalRanking:[], undoStack:[]
  };
}
let state = load() || initialState();
state.view = "home";

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function load() { try { const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : null; } catch (e) { return null; } }
function esc(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
function compareLabelPath(a,b) {
  const order = {S:0,A:1,B:2,C:3,D:4};
  const len = Math.max(a.length,b.length);
  for (let i=0;i<len;i++) {
    if (a[i] == null) return -1;
    if (b[i] == null) return 1;
    if (order[a[i]] < order[b[i]]) return -1;
    if (order[a[i]] > order[b[i]]) return 1;
  }
  return 0;
}
function groupLabel(path) { return path.length ? path.join(" > ") : "全曲"; }
function pageClass() {
  if (state.transition === "forward-home") return "page flip-in-home";
  if (state.transition === "forward") return "page flip-in";
  if (state.transition === "back") return "page flip-back";
  return "page";
}
function nav(view, transition="forward") {
  state.view = view;
  state.transition = transition;
  render();
  if (transition !== "none") {
    setTimeout(() => {
      state.transition = "none";
      render();
    }, transition === "forward-home" ? 1160 : 760);
  }
}
function startNew() {
  state = initialState();
  state.startedAt = new Date().toISOString();
  beginNextClassificationGroup();
  state.view = "classify";
  state.transition = "forward-home";
  save();
  render();
  setTimeout(() => { state.transition = "none"; render(); }, 1160);
}
function resume() {
  const loaded = load();
  if (loaded) state = loaded;
  if (state.currentClassification) state.view = "classify";
  else if (state.currentRanking) state.view = "rank";
  else if (state.currentBoundary) state.view = "boundary";
  else if (state.finalRanking && state.finalRanking.length) state.view = "result";
  else state.view = "home";
  state.transition = "forward-home";
  save();
  render();
  setTimeout(() => { state.transition = "none"; render(); }, 1160);
}
function goHome() { nav("home","back"); }
function snapshotClassification() {
  const cc = state.currentClassification;
  return {
    index: cc.index,
    buckets: { S:[...cc.buckets.S], A:[...cc.buckets.A], B:[...cc.buckets.B], C:[...cc.buckets.C], D:[...cc.buckets.D] },
    history: [...cc.history]
  };
}
function beginNextClassificationGroup() {
  const next = state.classifyQueue.find(g => !g.done);
  if (!next) return buildRankingQueue();
  state.currentClassification = {
    groupId: next.id,
    labelPath: [...next.labelPath],
    songs: [...next.songs],
    index: 0,
    buckets: {S:[],A:[],B:[],C:[],D:[]},
    history: []
  };
  state.undoStack = [];
  state.view = "classify";
}
function classifyCurrentSong(rank) {
  const cc = state.currentClassification;
  if (!cc) return;
  state.undoStack.push(snapshotClassification());
  if (state.undoStack.length > MAX_UNDO) state.undoStack.shift();
  const song = cc.songs[cc.index];
  cc.buckets[rank].push(song);
  cc.history.push({song, rank});
  cc.index += 1;
  if (cc.index >= cc.songs.length) finalizeCurrentClassification();
  else { save(); render(); }
}
function undoClassification() {
  const cc = state.currentClassification;
  if (!cc || !state.undoStack.length) return;
  const prev = state.undoStack.pop();
  cc.index = prev.index;
  cc.buckets = prev.buckets;
  cc.history = prev.history;
  save();
  render();
}
function finalizeCurrentClassification() {
  const cc = state.currentClassification;
  const target = state.classifyQueue.find(g => g.id === cc.groupId);
  if (target) target.done = true;
  ["S","A","B","C","D"].forEach(key => {
    const arr = cc.buckets[key];
    if (!arr.length) return;
    if (arr.length <= 15) {
      state.rankedGroups.push({ id:cc.groupId+"_"+key, labelPath:[...cc.labelPath,key], songs:[...arr], ranked:false, finalOrder:[] });
    } else {
      state.classifyQueue.push({ id:cc.groupId+"_"+key, labelPath:[...cc.labelPath,key], songs:[...arr], done:false });
    }
  });
  state.currentClassification = null;
  state.undoStack = [];
  beginNextClassificationGroup();
  save();
  render();
}
function buildRankingQueue() {
  state.rankingQueue = state.rankedGroups.filter(g => !g.ranked).sort((a,b)=>compareLabelPath(a.labelPath,b.labelPath));
  if (!state.rankingQueue.length) return buildBoundaryQueue();
  const g = state.rankingQueue[0];
  state.currentRanking = { groupId:g.id, labelPath:[...g.labelPath], songs:[...g.songs] };
  state.view = "rank";
}
function moveItem(arr, from, to) {
  if (to < 0 || to > arr.length || from === to) return;
  const item = arr.splice(from,1)[0];
  arr.splice(to,0,item);
}
function nudgeRanking(index, dir) {
  if (!state.currentRanking) return;
  const arr = state.currentRanking.songs;
  const to = index + dir;
  if (to < 0 || to >= arr.length) return;
  const item = arr.splice(index,1)[0];
  arr.splice(to,0,item);
  save(); render();
}
function confirmRanking() {
  const cr = state.currentRanking;
  const group = state.rankedGroups.find(g => g.id === cr.groupId);
  group.ranked = true;
  group.finalOrder = [...cr.songs];
  state.currentRanking = null;
  buildRankingQueue();
  save();
  render();
}
function buildBoundaryQueue() {
  const ordered = state.rankedGroups.slice().sort((a,b)=>compareLabelPath(a.labelPath,b.labelPath));
  state.boundaryPairs = [];
  for (let i=0;i<ordered.length-1;i++) state.boundaryPairs.push({ leftGroupId:ordered[i].id, rightGroupId:ordered[i+1].id, done:false });
  beginNextBoundary();
}
function beginNextBoundary() {
  const next = state.boundaryPairs.find(p => !p.done);
  if (!next) return buildFinalRanking();
  const left = state.rankedGroups.find(g => g.id === next.leftGroupId);
  const right = state.rankedGroups.find(g => g.id === next.rightGroupId);
  const leftSlice = left.finalOrder.slice(Math.max(0, left.finalOrder.length - 3));
  const rightSlice = right.finalOrder.slice(0, Math.min(3, right.finalOrder.length));
  state.currentBoundary = {
    leftGroupId:left.id,
    rightGroupId:right.id,
    leftKeep:left.finalOrder.slice(0, left.finalOrder.length - leftSlice.length),
    rightKeep:right.finalOrder.slice(rightSlice.length),
    combined:[...leftSlice, ...rightSlice]
  };
  state.view = "boundary";
}
function confirmBoundary() {
  const cb = state.currentBoundary;
  const left = state.rankedGroups.find(g => g.id === cb.leftGroupId);
  const right = state.rankedGroups.find(g => g.id === cb.rightGroupId);
  const leftCount = Math.min(3, left.finalOrder.length);
  left.finalOrder = [...cb.leftKeep, ...cb.combined.slice(0,leftCount)];
  right.finalOrder = [...cb.combined.slice(leftCount), ...cb.rightKeep];
  const pair = state.boundaryPairs.find(p => p.leftGroupId === cb.leftGroupId && p.rightGroupId === cb.rightGroupId);
  if (pair) pair.done = true;
  state.currentBoundary = null;
  beginNextBoundary();
  save();
  render();
}
function skipBoundary() {
  const cb = state.currentBoundary;
  const pair = state.boundaryPairs.find(p => p.leftGroupId === cb.leftGroupId && p.rightGroupId === cb.rightGroupId);
  if (pair) pair.done = true;
  state.currentBoundary = null;
  beginNextBoundary();
  save();
  render();
}
function skipAllBoundary() {
  if (!state.currentBoundary) return;
  const cb = state.currentBoundary;
  const pair = state.boundaryPairs.find(p => p.leftGroupId === cb.leftGroupId && p.rightGroupId === cb.rightGroupId);
  if (pair) pair.done = true;
  state.boundaryPairs.forEach(p => p.done = true);
  state.currentBoundary = null;
  buildFinalRanking();
  save();
  render();
}
function buildFinalRanking() {
  state.finalRanking = [];
  state.rankedGroups.slice().sort((a,b)=>compareLabelPath(a.labelPath,b.labelPath)).forEach(g => {
    g.finalOrder.forEach(song => state.finalRanking.push({song, album:ALBUM_MAP[song] || "不明"}));
  });
  state.view = "result";
}
function exportJson(filename, data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 500);
}
function exportText(filename, text) {
  const blob = new Blob([text], {type:"text/plain;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 500);
}
function saveStateFile() { exportJson("yorushika_ranker_state.json", state); }
function importState(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      state = JSON.parse(reader.result);
      state.view = "home";
      state.transition = "none";
      save();
      render();
      alert("保存状態を読み込みました。");
    } catch (e) {
      alert("読み込みに失敗しました。");
    }
  };
  reader.readAsText(file);
}
function exportRankingJson() {
  exportJson("yorushika_ranking.json", {
    title:"あなたのヨルシカランキング",
    totalSongs:state.finalRanking.length,
    ranking: state.finalRanking.map((x,i)=>({rank:i+1, song:x.song, album:x.album}))
  });
}
function exportRankingTxt() {
  exportText("yorushika_ranking.txt", ["あなたのヨルシカランキング","",...state.finalRanking.map((x,i)=>`${i+1}. ${x.song} [${x.album}]`)].join("\n"));
}
function albumRankingData() {
  const total = state.finalRanking.length || 1;
  const buckets = {};
  state.finalRanking.forEach((x, idx) => {
    const a = x.album || "不明";
    if (!buckets[a]) buckets[a] = {album:a, tracks:0, sumScore:0, bestRank:999};
    buckets[a].tracks += 1;
    buckets[a].sumScore += (total - idx);
    buckets[a].bestRank = Math.min(buckets[a].bestRank, idx+1);
  });
  return Object.values(buckets).map(x => ({...x, averageScore:x.sumScore/x.tracks})).sort((a,b)=>b.averageScore-a.averageScore || a.bestRank-b.bestRank || a.album.localeCompare(b.album,"ja"));
}

function clearDragIndicators(list) {
  list.querySelectorAll(".drag-item").forEach(x => x.classList.remove("drag-over-top","drag-over-bottom"));
}
function bindDragList() {
  const list = document.getElementById("dragList");
  if (!list || !state.currentRanking) return;
  let dragIndex = null;
  function clearStates() {
    list.querySelectorAll(".drag-item").forEach(x => x.classList.remove("drag-over-top","drag-over-bottom","dragging"));
    document.body.classList.remove("drag-lock");
  }
  list.querySelectorAll(".drag-item").forEach(item => {
    const handle = item.querySelector(".drag-handle");
    if (!handle) return;
    let pointerId = null;
    let started = false;
    handle.addEventListener("pointerdown", e => {
      pointerId = e.pointerId;
      dragIndex = Number(item.dataset.index);
      started = false;
      document.body.classList.add("drag-lock");
      handle.setPointerCapture(pointerId);
      e.preventDefault();
    });
    handle.addEventListener("pointermove", e => {
      if (pointerId !== e.pointerId) return;
      started = true;
      item.classList.add("dragging");
      let target = null;
      let before = false;
      for (const el of list.querySelectorAll(".drag-item")) {
        if (el === item) continue;
        const rect = el.getBoundingClientRect();
        if (e.clientY >= rect.top && e.clientY <= rect.bottom) {
          target = el;
          before = (e.clientY - rect.top) < rect.height / 2;
          break;
        }
      }
      list.querySelectorAll(".drag-item").forEach(el => el.classList.remove("drag-over-top","drag-over-bottom"));
      if (target) target.classList.add(before ? "drag-over-top" : "drag-over-bottom");
      e.preventDefault();
    }, {passive:false});
    const finish = e => {
      if (pointerId !== e.pointerId) return;
      try { handle.releasePointerCapture(pointerId); } catch(err) {}
      if (started) {
        let target = null;
        let before = false;
        for (const el of list.querySelectorAll(".drag-item")) {
          if (el === item) continue;
          const rect = el.getBoundingClientRect();
          if (e.clientY >= rect.top && e.clientY <= rect.bottom) {
            target = el;
            before = (e.clientY - rect.top) < rect.height / 2;
            break;
          }
        }
        if (target) {
          const targetIndex = Number(target.dataset.index);
          let insertIndex = before ? targetIndex : targetIndex + 1;
          if (dragIndex < insertIndex) insertIndex -= 1;
          moveItem(state.currentRanking.songs, dragIndex, insertIndex);
          save(); render();
          return;
        }
      }
      clearStates();
      pointerId = null;
      started = false;
    };
    handle.addEventListener("pointerup", finish);
    handle.addEventListener("pointercancel", finish);
  });
}
